<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Slime Pet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hiệu ứng bão (Mưa, Sét, Mây xám) -->
  <div id="storm-container">
    <div id="dark-overlay"></div>
    <div id="lightning-layer"></div>
    <div id="storm-clouds">
      <div class="storm-cloud cloud-top-1"></div>
      <div class="storm-cloud cloud-top-2"></div>
      <div class="storm-cloud cloud-top-3"></div>
    </div>
    <div id="rain-layer"></div>
  </div>

  <!-- Hiệu ứng cầu vồng -->
  <div id="rainbow-container"></div>

  <!-- Hiệu ứng tia nắng -->
  <div id="sunbeam-container">
    <div id="sunbeams"></div>
  </div>

  <!-- Hiệu ứng mây trôi -->
  <div id="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
  </div>

  <!-- Hiệu ứng tia nắng -->

  <!-- Vùng dò tìm cạnh phải -->
  <div id="right-edge-detector" class="interactive"></div>

  <!-- Draw mode indicator (Space key) -->
  <div id="drawIndicator">
    <span id="drawIndicatorIcon">⌨️</span>
    <span id="drawStatus">Giữ Space để vẽ sàn</span>
  </div>

  <!-- Ký hiệu nhạc đang phát -->
  <div id="music-status" class="interactive">
    <span id="music-icon">🎵</span>
  </div>

  <!-- Giao diện công cụ góc phải -->
  <div id="controls" class="interactive">
    <button id="quitBtn">❌ Thoát</button>
  </div>

  <!-- Bé Sui -->
  <img id="slime" class="interactive" src="assets/Slime_Sui.svg" alt="Slime">

  <!-- Cửa sổ quản lý (Nhạc & Sự kiện) -->
  <div id="sui-manager" class="interactive">
    <div class="window-header">
      <div class="tab-container">
        <div class="tab active" data-tab="music">Âm nhạc 🎵</div>
        <div class="tab" data-tab="events">Sự kiện 📅</div>
      </div>
      <div class="header-controls">
        <button id="closeManagerBtn" title="Đóng">✖️</button>
      </div>
    </div>
    
    <div class="window-body">
      <!-- Tab Âm nhạc -->
      <div id="tab-music" class="tab-pane active">
        <div class="pane-header">
          <div class="music-controls-top">
            <button id="playBtn" title="Phát/Tạm dừng">▶️</button>
            <div id="sortContainer" class="sort-pill">
              <button id="sortActionBtn" title="Thực hiện sắp xếp danh sách phát">Tự sắp xếp</button>
              <div class="sort-dropdown">
                <button id="sortDropdownBtn" title="Chọn chế độ">▼</button>
                <div id="sortDropdownMenu" class="sort-dropdown-content">
                  <div data-mode="manual" class="active">Tự sắp xếp</div>
                  <div data-mode="default">Sắp xếp mặc định</div>
                  <div data-mode="random">Sắp xếp ngẫu nhiên</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="pane-content">
          <div class="section">
            <div class="section-header">
              <h4>Thư viện nhạc</h4>
              <button id="refreshLibraryBtn" title="Làm mới thư viện nhạc" class="icon-btn">🔄</button>
            </div>
            <div id="library-list" class="music-list"></div>
          </div>
          <div class="section divider"></div>
          <div class="section">
            <h4>Danh sách phát</h4>
            <div id="playlist-list" class="music-list"></div>
          </div>
        </div>
      </div>

      <!-- Tab Sự kiện -->
      <div id="tab-events" class="tab-pane">
        <div class="pane-header">
          <h4>Quản lý sự kiện</h4>
        </div>
        <div class="pane-content">
          <div id="event-list" class="event-list-container">
            <!-- Danh sách sự kiện sẽ được render bằng JavaScript -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="features/music_player.js"></script>
  <script src="features/weather_effects.js"></script>
  <script src="features/event_manager_ui.js"></script>
  <script src="renderer.js"></script>
  <script src="event/birthday_event.js"></script>
</body>
</html>
